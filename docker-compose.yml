services:
  # Frontend - Vite dev server
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - VITE_API_URL=http://localhost:3001
      - VITE_UHRP_PROVIDERS=https://go-uhrp-us-1.bsvblockchain.tech,https://nanostore.babbage.systems
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src

  # Backend - Express overlay engine
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=p2p_medical
      - BHS_URL=http://bhs:8080
      - ARC_URL=https://api.taal.com/arc
      - ARC_API_KEY=${ARC_API_KEY:-}
    depends_on:
      mongodb:
        condition: service_healthy

  # MongoDB - overlay state storage
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Block Headers Service - SPV chain validation
  bhs:
    image: bsvb/block-headers-service:latest
    ports:
      - "8080:8080"
    environment:
      - DB_MODE=sqlite
    volumes:
      - bhs_data:/app/data

volumes:
  mongodb_data:
  bhs_data:
