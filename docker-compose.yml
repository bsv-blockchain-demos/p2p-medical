version: '3.8'

services:
  # Frontend - Vite dev server
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:3001
      - VITE_UHRP_URL=http://localhost:3002
      - VITE_UHRP_PROVIDERS=https://nanostore.babbage.systems
      - VITE_MESSAGEBOX_URL=http://localhost:3003
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src

  # Backend - Express overlay engine
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=p2p_medical
      - BHS_URL=http://bhs:8080
    depends_on:
      mongodb:
        condition: service_healthy

  # MongoDB - overlay state storage
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO - S3-compatible object storage for UHRP
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO bucket init
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/medical-files --ignore-existing;
      exit 0;
      "

  # Block Headers Service - SPV chain validation
  bhs:
    image: bsvb/block-headers-service:latest
    ports:
      - "8080:8080"
    environment:
      - DB_MODE=sqlite
    volumes:
      - bhs_data:/app/data

  # UHRP Storage Server (placeholder - uses BSV's reference implementation)
  uhrp-storage:
    build:
      context: ./services/uhrp-storage
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=medical-files
      - BHS_URL=http://bhs:8080
    depends_on:
      minio-init:
        condition: service_completed_successfully
      bhs:
        condition: service_started

  # Message Box Server (placeholder - uses BSV's reference implementation)
  message-box:
    build:
      context: ./services/message-box
      dockerfile: Dockerfile
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=message_box
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongodb_data:
  minio_data:
  bhs_data:
